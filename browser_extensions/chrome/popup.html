<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UATP AI Capture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 380px;
            min-height: 500px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .header {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.1);
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 20px;
        }
        
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .status-row:last-child {
            margin-bottom: 0;
        }
        
        .status-label {
            opacity: 0.8;
            font-size: 14px;
        }
        
        .status-value {
            font-weight: 500;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .status-active {
            background: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }
        
        .status-inactive {
            background: #ef4444;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
        }
        
        .button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .button-primary {
            background: rgba(16, 185, 129, 0.8);
            border-color: rgba(16, 185, 129, 1);
        }
        
        .button-primary:hover {
            background: rgba(16, 185, 129, 1);
        }
        
        .button-danger {
            background: rgba(239, 68, 68, 0.8);
            border-color: rgba(239, 68, 68, 1);
        }
        
        .button-danger:hover {
            background: rgba(239, 68, 68, 1);
        }
        
        .settings-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,255,255,0.3);
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #10b981;
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        
        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #10b981;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }
        
        .footer {
            padding: 16px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }
        
        .footer-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer-link {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            font-size: 12px;
        }
        
        .footer-link:hover {
            opacity: 1;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
        }
        
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📦 UATP</div>
        <div class="subtitle">Universal AI Accountability</div>
    </div>
    
    <div class="content">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div>Connecting to UATP system...</div>
        </div>
        
        <div id="main-content" style="display: none;">
            <div class="status-card">
                <div class="section-title">🌐 Current Platform</div>
                <div class="status-row">
                    <span class="status-label">Platform:</span>
                    <span class="status-value" id="platform-name">Unknown</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Auto-Capture:</span>
                    <span class="status-value">
                        <span class="status-indicator" id="capture-indicator"></span>
                        <span id="capture-status">Unknown</span>
                    </span>
                </div>
                <div class="status-row">
                    <span class="status-label">Session:</span>
                    <span class="status-value" id="session-id">Unknown</span>
                </div>
            </div>
            
            <div class="controls">
                <button id="toggle-capture" class="button button-primary">
                    Enable Auto-Capture
                </button>
                
                <button id="capture-now" class="button">
                    📸 Capture Current Conversation
                </button>
                
                <button id="view-dashboard" class="button">
                    📊 Open Dashboard
                </button>
                
                <button id="settings" class="button">
                    ⚙️ Settings
                </button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="messages-captured">0</div>
                    <div class="stat-label">Messages</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="significance-score">0%</div>
                    <div class="stat-label">Avg Significance</div>
                </div>
            </div>
            
            <div class="settings-section">
                <div class="section-title">
                    ⚙️ Quick Settings
                </div>
                
                <div class="status-row">
                    <span class="status-label">Show Notifications:</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notifications-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="status-row">
                    <span class="status-label">High Quality Only:</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="quality-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="footer-links">
            <a href="#" id="help-link" class="footer-link">Help</a>
            <span class="footer-link">v2.0.0</span>
            <a href="#" id="website-link" class="footer-link">uatp.app</a>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
