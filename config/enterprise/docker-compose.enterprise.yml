version: '3.8'

services:
  # UATP Enterprise Application
  uatp-enterprise:
    image: uatp-capsule-engine:enterprise-latest
    container_name: uatp-enterprise-app
    restart: unless-stopped
    environment:
      # Core Configuration
      - UATP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      
      # Database Configuration
      - DATABASE_URL=postgresql://uatp_user:${DB_PASSWORD}@postgres:5432/uatp_enterprise
      - DATABASE_POOL_SIZE=20
      - DATABASE_MAX_OVERFLOW=30
      
      # Redis Configuration  
      - REDIS_URL=redis://redis:6379/0
      - REDIS_SESSION_DB=1
      - REDIS_CACHE_DB=2
      - REDIS_RATE_LIMIT_DB=3
      
      # Security Configuration
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=8
      - BCRYPT_ROUNDS=12
      
      # Enterprise Features
      - MULTI_TENANT_ENABLED=true
      - ENTERPRISE_FEATURES_ENABLED=true
      - SSO_ENABLED=true
      - GOVERNANCE_ENABLED=true
      - COMPLIANCE_REPORTING_ENABLED=true
      - ADVANCED_ANALYTICS_ENABLED=true
      
      # Rate Limiting Configuration
      - RATE_LIMITING_ENABLED=true
      - RATE_LIMITING_STORAGE=redis
      - DEFAULT_RATE_LIMIT_RPM=1000
      - DEFAULT_RATE_LIMIT_RPH=10000
      
      # SSO Configuration
      - SSO_SESSION_TIMEOUT=28800
      - SSO_MAX_SESSIONS_PER_USER=5
      - MFA_REQUIRED=true
      
      # Compliance Configuration
      - AUDIT_LOG_ENABLED=true
      - AUDIT_LOG_LEVEL=comprehensive
      - AUDIT_LOG_RETENTION_DAYS=2555
      - GDPR_MODE=true
      - HIPAA_MODE=${HIPAA_MODE:-false}
      - SOX_MODE=${SOX_MODE:-false}
      
      # File Storage
      - FILE_STORAGE_TYPE=s3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_S3_REGION=${AWS_S3_REGION}
      
      # Monitoring
      - PROMETHEUS_METRICS_ENABLED=true
      - STRUCTURED_LOGGING_ENABLED=true
      - SENTRY_DSN=${SENTRY_DSN}
      
      # Email Configuration
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=true
      
      # Webhook Configuration
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - WEBHOOK_TIMEOUT=30
      
    ports:
      - "8000:8000"
    volumes:
      - app_logs:/app/logs
      - report_storage:/app/reports
      - ./config/enterprise:/app/config
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 1G
          cpus: "0.5"

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: uatp-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=uatp_enterprise
      - POSTGRES_USER=uatp_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./config/postgresql/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uatp_user -d uatp_enterprise"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.25"

  # Redis Cache and Session Store
  redis:
    image: redis:7-alpine
    container_name: uatp-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"
        reservations:
          memory: 256M
          cpus: "0.1"

  # nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: uatp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./config/nginx/sites-enabled:/etc/nginx/sites-enabled
      - ./ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - uatp-enterprise
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: uatp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    depends_on:
      - uatp-enterprise
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: uatp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # Log Aggregation (optional)
  loki:
    image: grafana/loki:latest
    container_name: uatp-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # Log Collection
  promtail:
    image: grafana/promtail:latest
    container_name: uatp-promtail
    restart: unless-stopped
    volumes:
      - app_logs:/var/log/app
      - nginx_logs:/var/log/nginx
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local
  report_storage:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16