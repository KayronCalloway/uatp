# Prometheus Alerting Rules for UATP Capsule Engine

groups:
  - name: uatp_alerts
    rules:
      # High-level service alerts
      - alert: UATPServiceDown
        expr: up{job="uatp-app"} == 0
        for: 1m
        labels:
          severity: critical
          service: uatp-app
        annotations:
          summary: "UATP service is down"
          description: "UATP Capsule Engine service has been down for more than 1 minute"

      - alert: UATPHighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: uatp-app
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"

      - alert: UATPSlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: uatp-app
        annotations:
          summary: "Slow response times detected"
          description: "95th percentile response time is {{ $value }}s"

      # Database alerts
      - alert: DatabaseConnectionHigh
        expr: database_connections_active > 80
        for: 3m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "High database connection usage"
          description: "Database connection usage is {{ $value }}"

      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "Database is down"
          description: "PostgreSQL database has been down for more than 1 minute"

      # Redis alerts
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis cache service has been down for more than 1 minute"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      # System resource alerts
      - alert: HighCPUUsage
        expr: system_cpu_usage_percent > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"

      - alert: HighMemoryUsage
        expr: system_memory_usage_percent > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%"

      - alert: DiskSpaceRunningLow
        expr: system_disk_usage_percent > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "Disk space running low"
          description: "Disk usage is {{ $value }}%"

      - alert: DiskSpaceCritical
        expr: system_disk_usage_percent > 95
        for: 1m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Disk space critical"
          description: "Disk usage is {{ $value }}%"

      # Security alerts
      - alert: HighSecurityEventRate
        expr: rate(security_events_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "High security event rate"
          description: "Security events rate is {{ $value }} events per second"

      - alert: AuthenticationFailureSpike
        expr: rate(security_events_total{event_type="failed_login"}[5m]) > 2
        for: 2m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "Authentication failure spike"
          description: "Failed login rate is {{ $value }} per second"

      - alert: RateLimitingTriggered
        expr: rate(security_events_total{event_type="rate_limit_exceeded"}[5m]) > 10
        for: 1m
        labels:
          severity: info
          service: security
        annotations:
          summary: "Rate limiting frequently triggered"
          description: "Rate limit exceeded {{ $value }} times per second"

      # Business logic alerts
      - alert: UserRegistrationFailureRate
        expr: rate(user_registrations_total{status="failed"}[10m]) / rate(user_registrations_total[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "High user registration failure rate"
          description: "User registration failure rate is {{ $value | humanizePercentage }}"

      - alert: PaymentTransactionFailureRate
        expr: rate(payment_transactions_total{status="failed"}[10m]) / rate(payment_transactions_total[10m]) > 0.05
        for: 3m
        labels:
          severity: critical
          service: business
        annotations:
          summary: "High payment transaction failure rate"
          description: "Payment failure rate is {{ $value | humanizePercentage }}"

      - alert: CitizenshipApplicationBacklog
        expr: citizenship_applications_total{status="pending"} > 100
        for: 30m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Citizenship application backlog"
          description: "{{ $value }} citizenship applications are pending"

      # Application-specific alerts
      - alert: ActiveUserCountDrop
        expr: active_users_current < 50
        for: 10m
        labels:
          severity: info
          service: business
        annotations:
          summary: "Low active user count"
          description: "Only {{ $value }} users are currently active"

      - alert: BondCreationFailures
        expr: rate(application_errors_total{error_type="BondCreationError"}[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Bond creation failures detected"
          description: "Bond creation error rate is {{ $value }} per second"

  - name: uatp_capacity_planning
    rules:
      # Capacity planning alerts
      - alert: DatabaseConnectionsNearLimit
        expr: database_connections_active / database_connections_max > 0.8
        for: 10m
        labels:
          severity: info
          service: capacity
        annotations:
          summary: "Database connections approaching limit"
          description: "Database connections at {{ $value | humanizePercentage }} of capacity"

      - alert: HighThroughputDetected
        expr: rate(http_requests_total[1m]) > 1000
        for: 5m
        labels:
          severity: info
          service: capacity
        annotations:
          summary: "High throughput detected"
          description: "Request rate is {{ $value }} requests per second"

      - alert: ResponseTimeIncreasing
        expr: increase(histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))[30m:5m]) > 0.5
        for: 10m
        labels:
          severity: warning
          service: capacity
        annotations:
          summary: "Response times increasing"
          description: "95th percentile response time has increased by {{ $value }}s over 30 minutes"

  - name: uatp_compliance
    rules:
      # Compliance and audit alerts
      - alert: AuditLogWriteFailure
        expr: rate(application_errors_total{error_type="AuditLogError"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: compliance
        annotations:
          summary: "Audit log write failures"
          description: "Audit logging is failing at {{ $value }} errors per second"

      - alert: ComplianceCheckFailure
        expr: rate(application_errors_total{error_type="ComplianceCheckError"}[5m]) > 0
        for: 3m
        labels:
          severity: warning
          service: compliance
        annotations:
          summary: "Compliance check failures"
          description: "Compliance checks are failing at {{ $value }} errors per second"

      - alert: DataRetentionPolicyViolation
        expr: logs_retention_violation_total > 0
        for: 1m
        labels:
          severity: critical
          service: compliance
        annotations:
          summary: "Data retention policy violation"
          description: "{{ $value }} log entries violate retention policy"

  - name: uatp_external_dependencies
    rules:
      # External service dependency alerts
      - alert: ExternalAPIHighLatency
        expr: histogram_quantile(0.95, rate(external_api_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: external
        annotations:
          summary: "High latency to external APIs"
          description: "External API 95th percentile response time is {{ $value }}s"

      - alert: ExternalAPIErrorRate
        expr: rate(external_api_requests_total{status_code=~"5.."}[5m]) / rate(external_api_requests_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: external
        annotations:
          summary: "High error rate from external APIs"
          description: "External API error rate is {{ $value | humanizePercentage }}"

      - alert: PaymentGatewayDown
        expr: up{job="payment-gateway"} == 0
        for: 2m
        labels:
          severity: critical
          service: external
        annotations:
          summary: "Payment gateway is down"
          description: "Payment gateway service is unavailable"