name: UATP Capsule Engine CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt', 'requirements*.in', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Cache mypy cache
      uses: actions/cache@v4
      with:
        path: .mypy_cache
        key: ${{ runner.os }}-mypy-${{ matrix.python-version }}-${{ hashFiles('src/**/*.py') }}
        restore-keys: |
          ${{ runner.os }}-mypy-${{ matrix.python-version }}-
          ${{ runner.os }}-mypy-

    - name: Cache pre-commit
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pre-commit-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[test,dev]"  # Install package with test and dev extras

    - name: Run pre-commit hooks
      env:
        PRE_COMMIT_HOME: ${{ github.workspace }}/.pre-commit-cache
      run: |
        pre-commit run --all-files --show-diff-on-failure --verbose

    - name: Run type checking with mypy
      run: |
        mypy src/ --ignore-missing-imports
      continue-on-error: true

    - name: Run linting with ruff
      run: |
        ruff check src/ tests/ --exclude tests/legacy --exclude scripts/legacy_fixes

    - name: Check code formatting with ruff
      run: |
        ruff format --check src/ tests/ --exclude tests/legacy --exclude scripts/legacy_fixes

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        database: ["sqlite", "postgresql"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt', 'requirements*.in', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[test,dev]"  # Install package with test and dev extras

    - name: Set up database environment
      run: |
        if [ "${{ matrix.database }}" = "postgresql" ]; then
          echo "DATABASE_URL=postgresql+asyncpg://testuser:testpassword@localhost:5432/testdb" >> $GITHUB_ENV
        else
          echo "DATABASE_URL=sqlite+aiosqlite:///test.db" >> $GITHUB_ENV
        fi
        echo "ENVIRONMENT=testing" >> $GITHUB_ENV

    - name: Run tests
      env:
        PRE_COMMIT_HOME: ${{ github.workspace }}/.pre-commit-cache
        UATP_SIGNING_KEY: "6f4a423a4a4b4a4c4d4e4f505152535455565758595a5b5c5d5e5f6061626364"
        UATP_API_KEYS: '{"test_read_key": {"scopes": ["read"]}, "test_write_key": {"scopes": ["write"]}}'
      run: |
        pytest tests/ -v --ignore=tests/legacy --ignore=tests/integration --ignore=tests/capture --cov=src --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.11' && matrix.database == 'postgresql'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.11-security-${{ hashFiles('requirements*.txt', 'requirements*.in', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.11-
          ${{ runner.os }}-pip-

    - name: Cache safety DB
      uses: actions/cache@v4
      with:
        path: ~/.cache/safety-db
        key: ${{ runner.os }}-safety-db-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-safety-db-

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run security linting with bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true

    - name: Check dependencies with safety
      run: |
        mkdir -p ~/.cache/safety-db
        safety check --json --output safety-report.json --db ~/.cache/safety-db || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  build:
    runs-on: ubuntu-latest
    needs: [code-quality, tests, security]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.11-build-${{ hashFiles('requirements*.txt', 'requirements*.in', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.11-
          ${{ runner.os }}-pip-

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package with twine
      run: |
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
