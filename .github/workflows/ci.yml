# Minimal CI Workflow - Simplified for reliability
# Complex checks (pre-commit, security scans) should be run locally
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov

    - name: Run tests
      env:
        DATABASE_URL: sqlite:///test.db
        ENVIRONMENT: testing
        UATP_SIGNING_KEY: "6f4a423a4a4b4a4c4d4e4f505152535455565758595a5b5c5d5e5f6061626364"
      run: |
        pytest tests/ -v --ignore=tests/legacy -x

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Run ruff linting
      run: |
        ruff check src/ tests/ --exclude tests/legacy --exclude scripts/legacy_fixes

    - name: Check code formatting
      run: |
        ruff format --check src/ tests/ --exclude tests/legacy --exclude scripts/legacy_fixes
