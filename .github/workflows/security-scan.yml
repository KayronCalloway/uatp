# UATP Capsule Engine - Comprehensive Security Scanning Pipeline
# Automated security scanning with multiple tools for complete coverage

name:  Security Scanning Suite

on:
  # Disabled: requires infrastructure setup (Dockerfile, secrets, kubernetes manifests)
  # push:
  #   branches: [ main, develop, 'release/*' ]
  # pull_request:
  #   branches: [ main, develop ]
  schedule:
    # Run daily security scans at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - dependencies
          - secrets
          - container
          - infrastructure

permissions:
  contents: read
  security-events: write
  packages: read

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Dependency Vulnerability Scanning
  dependency-scan:
    name:  Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies' || github.event.inputs.scan_type == '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements*.txt', 'requirements*.in', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-security-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit semgrep pip-audit
        pip install -r requirements.txt

    - name: Run Safety (PyPI vulnerability database)
      run: |
        safety check --json --output safety-report.json || true
        safety check --short-report

    - name: Run pip-audit (Python package auditing)
      run: |
        pip-audit --format=json --output=pip-audit-report.json
        pip-audit --format=cyclonedx-json --output=pip-audit-sbom.json

    - name: Run Bandit (Python security linter)
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ -f txt

    - name: Run Semgrep (Static analysis)
      run: |
        semgrep --config=auto --json --output=semgrep-report.json src/ || true
        semgrep --config=auto src/

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: dependency-security-reports
        path: |
          safety-report.json
          pip-audit-report.json
          pip-audit-sbom.json
          bandit-report.json
          semgrep-report.json
        retention-days: 30

  # Secret Scanning
  secret-scan:
    name:  Secret Detection Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'secrets' || github.event.inputs.scan_type == '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for comprehensive secret scanning

    - name: Run GitLeaks (Secret detection)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    - name: Run TruffleHog (Secret scanner)
      run: |
        docker run --rm -v "$PWD:/pwd" trufflesecurity/trufflehog:latest github --repo https://github.com/${{ github.repository }} --json > trufflehog-report.json || true

    - name: Run detect-secrets
      run: |
        pip install detect-secrets
        detect-secrets scan --all-files --baseline .secrets.baseline
        detect-secrets audit .secrets.baseline

    - name: Upload secret scan reports
      uses: actions/upload-artifact@v4
      with:
        name: secret-scan-reports
        path: |
          trufflehog-report.json
          .secrets.baseline
        retention-days: 30

  # Container Security Scanning
  container-scan:
    name:  Container Security Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'container' || github.event.inputs.scan_type == '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build container image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        tags: uatp-security-test:latest
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy (Container vulnerability scanner)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'uatp-security-test:latest'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Run Trivy for JSON report
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          -v ${{ github.workspace }}:/workspace \
          aquasec/trivy image --format json --output /workspace/trivy-report.json uatp-security-test:latest

    - name: Run Grype (Container vulnerability scanner)
      uses: anchore/scan-action@v7
      with:
        image: "uatp-security-test:latest"
        fail-build: false
        output-format: json
        output-file: grype-report.json

    - name: Run Syft (SBOM generation)
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        syft uatp-security-test:latest -o json > syft-sbom.json
        syft uatp-security-test:latest -o spdx-json > syft-sbom-spdx.json

    - name: Upload container security reports
      uses: actions/upload-artifact@v4
      with:
        name: container-security-reports
        path: |
          trivy-results.sarif
          trivy-report.json
          grype-report.json
          syft-sbom.json
          syft-sbom-spdx.json
        retention-days: 30

    - name: Upload Trivy SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Infrastructure Security Scanning
  infrastructure-scan:
    name:  Infrastructure Security Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'infrastructure' || github.event.inputs.scan_type == '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Checkov (Infrastructure as Code scanner)
      run: |
        pip install checkov
        checkov -d . --framework kubernetes,dockerfile,docker_compose --output json --output-file checkov-report.json || true
        checkov -d . --framework kubernetes,dockerfile,docker_compose

    - name: Run kube-score (Kubernetes configuration analysis)
      run: |
        wget https://github.com/zegl/kube-score/releases/latest/download/kube-score_linux_amd64.tar.gz
        tar xzf kube-score_linux_amd64.tar.gz
        ./kube-score score infra/kubernetes/manifests/*.yaml --output-format json > kube-score-report.json || true
        ./kube-score score infra/kubernetes/manifests/*.yaml || true

    - name: Run Terrascan (Infrastructure security scanner)
      run: |
        curl -L "$(curl -s https://api.github.com/repos/tenable/terrascan/releases/latest | grep -o -E "https://.+?_Linux_x86_64.tar.gz")" > terrascan.tar.gz
        tar -xf terrascan.tar.gz terrascan && rm terrascan.tar.gz
        ./terrascan scan -i k8s -d infra/kubernetes/manifests/ --output json > terrascan-report.json || true

    - name: Run Polaris (Kubernetes best practices)
      run: |
        wget https://github.com/FairwindsOps/polaris/releases/latest/download/polaris_linux_amd64.tar.gz
        tar xzf polaris_linux_amd64.tar.gz
        ./polaris audit --audit-path infra/kubernetes/manifests/ --format json > polaris-report.json || true

    - name: Upload infrastructure security reports
      uses: actions/upload-artifact@v4
      with:
        name: infrastructure-security-reports
        path: |
          checkov-report.json
          kube-score-report.json
          terrascan-report.json
          polaris-report.json
        retention-days: 30

  # Security Report Aggregation and Analysis
  security-analysis:
    name:  Security Analysis & Reporting
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, container-scan, infrastructure-scan]
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Download all scan results
      uses: actions/download-artifact@v4
      with:
        path: security-results/

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install report generation tools
      run: |
        python -m pip install --upgrade pip
        pip install jinja2 pyyaml

    - name: Generate security summary
      run: |
        echo "# Security Scan Summary" > security-summary.md
        echo "" >> security-summary.md
        echo "Scan completed at: $(date)" >> security-summary.md
        echo "" >> security-summary.md
        echo "## Reports Generated" >> security-summary.md
        find security-results/ -name "*.json" -type f | while read f; do echo "- $f"; done >> security-summary.md

    - name: Upload comprehensive security report
      uses: actions/upload-artifact@v4
      with:
        name: comprehensive-security-report
        path: |
          security-summary.md

    - name: Comment security summary on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = 'security-summary.md';

          if (fs.existsSync(path)) {
            const summary = fs.readFileSync(path, 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `##  Security Scan Results\n\n${summary}`
            });
          }

  security-notification:
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, container-scan, infrastructure-scan]
    if: failure()

    steps:
    - name: Notify on security issues
      uses: actions/github-script@v6
      with:
        script: |
          const title = ' Security Vulnerability Detected';
          const body = `
          A security vulnerability has been detected in the latest scan.

          **Workflow:** ${{ github.workflow }}
          **Run ID:** ${{ github.run_id }}
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref }}

          Please review the security scan results and address any critical issues immediately.

          View the full results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          `;

          // Create an issue for security vulnerabilities
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['security', 'vulnerability', 'critical']
          });
