# Code Quality - DISABLED (run pre-commit locally instead)
# To re-enable, uncomment the 'on:' triggers below
name: Code Quality

# DISABLED - Run pre-commit locally instead
# on:
#   push:
#     branches: [ main, develop ]
#   pull_request:
#     branches: [ main, develop ]

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Run ruff formatter check
      run: |
        ruff format --check src/

    - name: Run ruff linting
      run: |
        ruff check src/

    - name: Run mypy type checking
      run: |
        mypy src/ --ignore-missing-imports
      continue-on-error: true

  complexity:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install radon xenon

    - name: Run complexity analysis
      run: |
        radon cc src/ -a
        radon mi src/

    - name: Check cyclomatic complexity
      run: |
        xenon --max-absolute B --max-modules A --max-average A src/
      continue-on-error: true

  documentation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydocstyle

    - name: Check docstring quality
      run: |
        pydocstyle src/ --convention=google
      continue-on-error: true

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Audit dependencies
      run: |
        pip-audit --desc --format=json --output=audit-report.json
        pip-audit --desc
      continue-on-error: true

    - name: Upload audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-audit
        path: audit-report.json
