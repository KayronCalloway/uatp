name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          Release notes for ${{ github.ref_name }}

          ## Changes
          - See commit history for detailed changes

          ## Installation
          ```bash
          pip install uatp-capsule-engine
          ```

          ## Documentation
          - [README](./README.md)
          - [API Status](./STATUS.md)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    runs-on: ubuntu-latest
    needs: create-release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build and push release image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          uatp/capsule-engine:${{ steps.get_version.outputs.VERSION }}
          uatp/capsule-engine:latest
        labels: |
          org.opencontainers.image.title=UATP Capsule Engine
          org.opencontainers.image.description=Universal Attribution and Transparency Protocol
          org.opencontainers.image.version=${{ steps.get_version.outputs.VERSION }}
          org.opencontainers.image.source=https://github.com/KayronCalloway/capsule-engine
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # NOTE: Production deployment removed - was a no-op placeholder.
  # Add real deployment job when infrastructure is ready.
  # See: https://github.com/KayronCalloway/uatp/issues for deployment planning
