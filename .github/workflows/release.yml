name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          Release notes for ${{ github.ref }}

          ## Changes
          - See commit history for detailed changes

          ## Installation
          ```bash
          docker pull uatp/capsule-engine:${{ github.ref }}
          ```

          ## Documentation
          - [User Guide](./docs/COMPREHENSIVE_SYSTEM_MANUAL.md)
          - [API Documentation](./docs/api-documentation.md)
          - [Deployment Guide](./docs/deployment-guide.md)
        draft: false
        prerelease: false

  docker-release:
    runs-on: ubuntu-latest
    needs: create-release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build and push release image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          uatp/capsule-engine:${{ steps.get_version.outputs.VERSION }}
          uatp/capsule-engine:latest
        labels: |
          org.opencontainers.image.title=UATP Capsule Engine
          org.opencontainers.image.description=Universal Attribution and Transparency Protocol
          org.opencontainers.image.version=${{ steps.get_version.outputs.VERSION }}
          org.opencontainers.image.source=https://github.com/KayronCalloway/capsule-engine
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-production:
    runs-on: ubuntu-latest
    needs: [create-release, docker-release]
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        # This might include:
        # - Updating Kubernetes manifests
        # - Triggering deployment pipeline
        # - Notifying monitoring systems

    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: 'UATP Capsule Engine ${{ github.ref }} deployment completed!'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
