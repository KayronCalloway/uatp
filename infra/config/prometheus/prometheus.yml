# Prometheus configuration for UATP Capsule Engine

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'uatp-monitor'

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 5s

  # UATP Application
  - job_name: 'uatp-app'
    static_configs:
      - targets: ['uatp_app:9090']
    scrape_interval: 15s
    metrics_path: '/metrics'
    scrape_timeout: 10s

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
    scrape_interval: 30s

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
    scrape_interval: 30s

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
    scrape_interval: 30s

  # Nginx Exporter
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']
    scrape_interval: 30s

  # Custom application metrics
  - job_name: 'uatp-custom-metrics'
    static_configs:
      - targets: ['uatp_app:8000']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Health checks
  - job_name: 'uatp-health'
    static_configs:
      - targets: ['uatp_app:8080']
    metrics_path: '/health'
    scrape_interval: 10s
    scrape_timeout: 5s
