# OpenTelemetry Collector Custom Resources for UATP
---
apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: uatp-otel-collector
  namespace: uatp-prod
  labels:
    app: uatp-otel-collector
    component: observability
spec:
  mode: deployment
  replicas: 2
  image: otel/opentelemetry-collector-contrib:0.88.0

  # Resource allocation for production workloads
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

  # Environment variables for configuration
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: K8S_POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: observability-secrets
          key: datadog-api-key
          optional: true
    - name: NEW_RELIC_LICENSE_KEY
      valueFrom:
        secretKeyRef:
          name: observability-secrets
          key: newrelic-license-key
          optional: true

  # Service account for RBAC
  serviceAccount: uatp-otel-collector

  # Ports configuration
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: jaeger-grpc
      port: 14250
      targetPort: 14250
      protocol: TCP
    - name: jaeger-thrift-http
      port: 14268
      targetPort: 14268
      protocol: TCP
    - name: jaeger-thrift-compact
      port: 6831
      targetPort: 6831
      protocol: UDP
    - name: zipkin
      port: 9411
      targetPort: 9411
      protocol: TCP
    - name: prometheus
      port: 8889
      targetPort: 8889
      protocol: TCP
    - name: health-check
      port: 13133
      targetPort: 13133
      protocol: TCP

  # Volume mounts for persistent storage
  volumeMounts:
    - name: otel-data
      mountPath: /tmp/otel-data
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibcontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  volumes:
    - name: otel-data
      emptyDir: {}
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibcontainers
      hostPath:
        path: /var/lib/docker/containers

  # Configuration reference
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
                - "http://localhost:*"
                - "https://*.uatp.ai"

      prometheus:
        config:
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'uatp-api'
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: ["uatp-prod"]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  target_label: __address__
                  regex: (.+)
                  replacement: ${1}:${2}

      jaeger:
        protocols:
          grpc:
            endpoint: 0.0.0.0:14250
          thrift_http:
            endpoint: 0.0.0.0:14268
          thrift_compact:
            endpoint: 0.0.0.0:6831

      zipkin:
        endpoint: 0.0.0.0:9411

      k8s_cluster:
        auth_type: serviceAccount
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
        allocatable_types_to_report: [cpu, memory, storage]

      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu:
            metrics:
              system.cpu.utilization:
                enabled: true
          memory:
            metrics:
              system.memory.utilization:
                enabled: true
          disk:
          network:
          filesystem:

      filelog:
        include:
          - /var/log/containers/*uatp*.log
        operators:
          - type: json_parser
            id: json_parser
            parse_from: attributes.message
            parse_to: attributes
          - type: move
            from: attributes.message
            to: body

    processors:
      memory_limiter:
        limit_mib: 1800
        spike_limit_mib: 400

      batch:
        timeout: 1s
        send_batch_size: 1024

      resource:
        attributes:
          - key: service.name
            value: uatp-capsule-engine
            action: upsert
          - key: k8s.cluster.name
            value: uatp-production
            action: upsert
          - key: deployment.environment
            value: production
            action: upsert

      attributes:
        actions:
          - key: capsule.type
            action: upsert
            from_attribute: capsule_type
          - key: attribution.chain_id
            action: upsert
            from_attribute: chain_id

      tail_sampling:
        decision_wait: 10s
        num_traces: 50000
        policies:
          - name: errors_policy
            type: status_code
            status_code: {status_codes: [ERROR]}
          - name: slow_requests_policy
            type: latency
            latency: {threshold_ms: 500}
          - name: capsule_operations_policy
            type: string_attribute
            string_attribute: {key: operation.type, values: [capsule_create, capsule_merge, attribution_track]}

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: uatp
        const_labels:
          service: uatp-capsule-engine
          environment: production

      otlp/jaeger:
        endpoint: jaeger-collector:4317
        tls:
          insecure: true

      logging:
        loglevel: info

      prometheusremotewrite:
        endpoint: "http://prometheus-server:9090/api/v1/write"
        tls:
          insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      memory_ballast:
        size_mib: 165

    service:
      extensions: [health_check, memory_ballast]
      pipelines:
        traces:
          receivers: [otlp, jaeger, zipkin]
          processors: [memory_limiter, resource, tail_sampling, batch]
          exporters: [otlp/jaeger, logging]
        metrics:
          receivers: [otlp, prometheus, k8s_cluster, hostmetrics]
          processors: [memory_limiter, resource, attributes, batch]
          exporters: [prometheus, prometheusremotewrite, logging]
        logs:
          receivers: [otlp, filelog]
          processors: [memory_limiter, resource, batch]
          exporters: [logging]

---
# Service Account for OpenTelemetry Collector
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uatp-otel-collector
  namespace: uatp-prod

---
# ClusterRole for OpenTelemetry Collector
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: uatp-otel-collector
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "services", "endpoints", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]

---
# ClusterRoleBinding for OpenTelemetry Collector
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: uatp-otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: uatp-otel-collector
subjects:
- kind: ServiceAccount
  name: uatp-otel-collector
  namespace: uatp-prod

---
# Service for OpenTelemetry Collector
apiVersion: v1
kind: Service
metadata:
  name: uatp-otel-collector
  namespace: uatp-prod
  labels:
    app: uatp-otel-collector
    component: observability
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8889"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: jaeger-grpc
    port: 14250
    targetPort: 14250
    protocol: TCP
  - name: jaeger-thrift-http
    port: 14268
    targetPort: 14268
    protocol: TCP
  - name: zipkin
    port: 9411
    targetPort: 9411
    protocol: TCP
  - name: prometheus
    port: 8889
    targetPort: 8889
    protocol: TCP
  - name: health-check
    port: 13133
    targetPort: 13133
    protocol: TCP
  selector:
    app.kubernetes.io/name: uatp-otel-collector

---
# HorizontalPodAutoscaler for OpenTelemetry Collector
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uatp-otel-collector-hpa
  namespace: uatp-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uatp-otel-collector
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
