---
apiVersion: v1
kind: ConfigMap
metadata:
  name: health-checker-scripts
  namespace: uatp-prod
data:
  global_health_checker.py: |
    #!/usr/bin/env python3
    import os
    import asyncio
    import json
    import time
    from datetime import datetime
    from typing import Dict, List, Optional, Any
    from dataclasses import dataclass
    from enum import Enum

    from fastapi import FastAPI, HTTPException
    from fastapi.responses import JSONResponse
    import uvicorn
    import aiohttp

    app = FastAPI(title="UATP Global Health Checker")

    class EndpointHealth:
        def __init__(self, region: str, endpoint: str):
            self.region = region
            self.endpoint = endpoint
            self.status = "unknown"
            self.latency = 0.0
            self.last_check = None
            self.error_count = 0
            self.success_count = 0

    class GlobalHealthChecker:
        def __init__(self):
            self.endpoints = {}
            self.check_interval = int(os.getenv("CHECK_INTERVAL", "30"))
            self.global_status = "unknown"
            self.parse_endpoints()

        def parse_endpoints(self):
            """Parse region endpoints from environment"""
            endpoint_str = os.getenv("REGION_ENDPOINTS", "")

            for endpoint_pair in endpoint_str.split(","):
                if ":" in endpoint_pair:
                    region, url = endpoint_pair.split(":", 1)
                    self.endpoints[region] = EndpointHealth(region, url)

        async def start_monitoring(self):
            """Start health monitoring loop"""
            asyncio.create_task(self.health_check_loop())

        async def health_check_loop(self):
            """Continuous health checking loop"""
            while True:
                await self.check_all_endpoints()
                await asyncio.sleep(self.check_interval)

        async def check_all_endpoints(self):
            """Check health of all regional endpoints"""
            tasks = []

            for endpoint_health in self.endpoints.values():
                task = self.check_endpoint_health(endpoint_health)
                tasks.append(task)

            await asyncio.gather(*tasks, return_exceptions=True)
            self.calculate_global_status()

        async def check_endpoint_health(self, endpoint_health: EndpointHealth):
            """Check health of a specific endpoint"""
            start_time = time.time()

            try:
                async with aiohttp.ClientSession(timeout=aiohttp.ClientTimeout(total=10)) as session:
                    async with session.get(f"{endpoint_health.endpoint}/health") as response:
                        latency = (time.time() - start_time) * 1000  # ms

                        if response.status == 200:
                            endpoint_health.status = "healthy"
                            endpoint_health.success_count += 1
                        else:
                            endpoint_health.status = "unhealthy"
                            endpoint_health.error_count += 1

                        endpoint_health.latency = latency
                        endpoint_health.last_check = datetime.now()

            except Exception as e:
                endpoint_health.status = "unavailable"
                endpoint_health.error_count += 1
                endpoint_health.latency = float('inf')
                endpoint_health.last_check = datetime.now()

        def calculate_global_status(self):
            """Calculate global health status"""
            healthy_count = sum(1 for ep in self.endpoints.values() if ep.status == "healthy")
            total_count = len(self.endpoints)

            if healthy_count == total_count:
                self.global_status = "healthy"
            elif healthy_count > 0:
                self.global_status = "degraded"
            else:
                self.global_status = "unhealthy"

        async def get_global_status(self) -> Dict[str, Any]:
            """Get global health status"""

            endpoint_statuses = {}
            for region, endpoint_health in self.endpoints.items():
                endpoint_statuses[region] = {
                    "status": endpoint_health.status,
                    "latency": endpoint_health.latency,
                    "last_check": endpoint_health.last_check.isoformat() if endpoint_health.last_check else None,
                    "success_count": endpoint_health.success_count,
                    "error_count": endpoint_health.error_count,
                    "endpoint": endpoint_health.endpoint
                }

            return {
                "global_status": self.global_status,
                "check_interval": self.check_interval,
                "total_regions": len(self.endpoints),
                "healthy_regions": sum(1 for ep in self.endpoints.values() if ep.status == "healthy"),
                "regions": endpoint_statuses,
                "timestamp": datetime.now().isoformat()
            }

    # Global health checker instance
    health_checker = GlobalHealthChecker()

    @app.on_event("startup")
    async def startup_event():
        await health_checker.start_monitoring()

    @app.get("/health")
    async def health():
        return {"status": "healthy", "service": "global-health-checker"}

    @app.get("/ready")
    async def ready():
        return {"status": "ready", "service": "global-health-checker"}

    @app.get("/global-status")
    async def get_global_status():
        return await health_checker.get_global_status()

    @app.get("/regions/{region}/status")
    async def get_region_status(region: str):
        if region not in health_checker.endpoints:
            raise HTTPException(status_code=404, detail=f"Region {region} not found")

        endpoint_health = health_checker.endpoints[region]
        return {
            "region": region,
            "status": endpoint_health.status,
            "latency": endpoint_health.latency,
            "last_check": endpoint_health.last_check.isoformat() if endpoint_health.last_check else None,
            "success_count": endpoint_health.success_count,
            "error_count": endpoint_health.error_count,
            "endpoint": endpoint_health.endpoint
        }

    if __name__ == "__main__":
        uvicorn.run(app, host="0.0.0.0", port=8080)

