apiVersion: apps/v1
kind: Deployment
metadata:
  name: uatp-api
  namespace: uatp-production
  labels:
    app: uatp-api
    version: v1.0.0
spec:
  replicas: 3  # Start with 3 replicas for HA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployments
  selector:
    matchLabels:
      app: uatp-api
  template:
    metadata:
      labels:
        app: uatp-api
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: uatp-api
                topologyKey: kubernetes.io/hostname

      containers:
        - name: uatp-api
          image: uatp-capsule-engine:latest  # Replace with actual registry
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Environment variables from ConfigMap
          envFrom:
            - configMapRef:
                name: uatp-config

          # Secrets (database credentials, API keys, etc.)
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: uatp-secrets
                  key: database-url
            - name: UATP_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: uatp-secrets
                  key: signing-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: uatp-secrets
                  key: anthropic-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: uatp-secrets
                  key: openai-api-key
                  optional: true

          # Resource limits and requests
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup probe for slow-starting apps
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30  # 150 seconds total

          # Security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Set true if app supports it
            capabilities:
              drop:
                - ALL

      # Security context for pod
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Restart policy
      restartPolicy: Always

      # Graceful shutdown
      terminationGracePeriodSeconds: 30
