apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-config
  namespace: uatp-production
data:
  # Database configuration
  UATP_DB_POOL_SIZE: "20"
  UATP_DB_MAX_OVERFLOW: "40"
  UATP_DB_POOL_RECYCLE: "3600"
  UATP_DB_POOL_TIMEOUT: "30"

  # API configuration
  UATP_API_PORT: "8000"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

  # CORS configuration
  CORS_ALLOWED_ORIGINS: "https://uatp.app,https://api.uatp.app,https://dashboard.uatp.app"

  # WebAuthn configuration
  WEBAUTHN_RP_ID: "uatp.app"
  WEBAUTHN_RP_NAME: "UATP Capsule Engine"

  # Cache configuration
  CACHE_ENABLED: "true"
  CACHE_URL: "redis://uatp-redis:6379/0"

  # Monitoring
  PROMETHEUS_ENABLED: "true"
  METRICS_PORT: "9090"
