# Production Secrets Template
# DO NOT commit actual secrets to git!
# Use kubectl create secret or external secrets manager

apiVersion: v1
kind: Secret
metadata:
  name: uatp-secrets
  namespace: uatp-production
type: Opaque
stringData:
  # Database connection string
  # Format: postgresql+asyncpg://user:password@host:5432/dbname
  database-url: "postgresql+asyncpg://uatp_user:CHANGE_ME@postgres-service:5432/uatp_production"

  # UATP signing key (hex format)
  # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
  signing-key: "CHANGE_ME_64_CHAR_HEX_STRING"

  # Key encryption password (REQUIRED in production)
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
  key-password: "CHANGE_ME_KEY_PASSWORD"

  # Optional: AI provider API keys
  anthropic-api-key: "sk-ant-api03-CHANGE_ME"
  openai-api-key: "sk-CHANGE_ME"

  # Optional: Stripe API keys (for billing)
  stripe-api-key: "sk_live_CHANGE_ME"
  stripe-webhook-secret: "whsec_CHANGE_ME"

---
# Instructions:
# 1. Copy this file to secrets.yaml (in .gitignore)
# 2. Replace all CHANGE_ME values with actual secrets
# 3. Apply with: kubectl apply -f secrets.yaml
#
# Better: Use external secrets management:
# - AWS Secrets Manager
# - HashiCorp Vault
# - Google Secret Manager
# - Azure Key Vault
