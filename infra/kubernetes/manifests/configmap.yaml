---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-config
  namespace: uatp-dev
data:
  ENVIRONMENT: "development"
  LOG_LEVEL: "DEBUG"
  DATABASE_NAME: "uatp_dev"
  REDIS_DB: "0"
  METRICS_PORT: "9090"
  HEALTH_CHECK_PORT: "8080"
  API_VERSION: "v1"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:8000"
  RATE_LIMIT_REQUESTS: "1000"
  RATE_LIMIT_WINDOW: "3600"
  CACHE_TTL: "300"
  SESSION_TIMEOUT: "1800"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-config
  namespace: uatp-staging
data:
  ENVIRONMENT: "staging"
  LOG_LEVEL: "INFO"
  DATABASE_NAME: "uatp_staging"
  REDIS_DB: "1"
  METRICS_PORT: "9090"
  HEALTH_CHECK_PORT: "8080"
  API_VERSION: "v1"
  CORS_ORIGINS: "https://staging.uatp.ai"
  RATE_LIMIT_REQUESTS: "5000"
  RATE_LIMIT_WINDOW: "3600"
  CACHE_TTL: "600"
  SESSION_TIMEOUT: "3600"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-config
  namespace: uatp-prod
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "WARN"
  DATABASE_NAME: "uatp_prod"
  REDIS_DB: "0"
  METRICS_PORT: "9090"
  HEALTH_CHECK_PORT: "8080"
  API_VERSION: "v1"
  CORS_ORIGINS: "https://uatp.ai,https://api.uatp.ai"
  RATE_LIMIT_REQUESTS: "10000"
  RATE_LIMIT_WINDOW: "3600"
  CACHE_TTL: "1800"
  SESSION_TIMEOUT: "7200"
