---
# Resource Quota for Development Environment
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uatp-dev-quota
  namespace: uatp-dev
spec:
  hard:
    # Compute resources
    requests.cpu: "4"
    requests.memory: "8Gi"
    requests.ephemeral-storage: "20Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    limits.ephemeral-storage: "40Gi"

    # Storage
    persistentvolumeclaims: "10"
    requests.storage: "100Gi"

    # Objects
    pods: "20"
    services: "10"
    secrets: "20"
    configmaps: "20"
    count/deployments.apps: "10"
    count/jobs.batch: "10"

---
# Resource Quota for Staging Environment
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uatp-staging-quota
  namespace: uatp-staging
spec:
  hard:
    # Compute resources
    requests.cpu: "8"
    requests.memory: "16Gi"
    requests.ephemeral-storage: "40Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    limits.ephemeral-storage: "80Gi"

    # Storage
    persistentvolumeclaims: "20"
    requests.storage: "200Gi"

    # Objects
    pods: "40"
    services: "20"
    secrets: "30"
    configmaps: "30"
    count/deployments.apps: "15"
    count/jobs.batch: "20"

---
# Resource Quota for Production Environment
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uatp-prod-quota
  namespace: uatp-prod
spec:
  hard:
    # Compute resources
    requests.cpu: "50"
    requests.memory: "100Gi"
    requests.ephemeral-storage: "200Gi"
    limits.cpu: "100"
    limits.memory: "200Gi"
    limits.ephemeral-storage: "400Gi"

    # GPU resources (if available)
    requests.nvidia.com/gpu: "4"
    limits.nvidia.com/gpu: "8"

    # Storage
    persistentvolumeclaims: "50"
    requests.storage: "1Ti"

    # Objects
    pods: "100"
    services: "50"
    secrets: "100"
    configmaps: "100"
    count/deployments.apps: "30"
    count/jobs.batch: "50"
    count/cronjobs.batch: "20"

---
# Limit Ranges for Development
apiVersion: v1
kind: LimitRange
metadata:
  name: uatp-dev-limits
  namespace: uatp-dev
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
      ephemeral-storage: "256Mi"
    max:
      cpu: "2"
      memory: "4Gi"
      ephemeral-storage: "10Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
      ephemeral-storage: "128Mi"
  - type: Pod
    max:
      cpu: "4"
      memory: "8Gi"
      ephemeral-storage: "20Gi"

---
# Limit Ranges for Staging
apiVersion: v1
kind: LimitRange
metadata:
  name: uatp-staging-limits
  namespace: uatp-staging
spec:
  limits:
  - type: Container
    default:
      cpu: "1"
      memory: "1Gi"
      ephemeral-storage: "2Gi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
      ephemeral-storage: "512Mi"
    max:
      cpu: "4"
      memory: "8Gi"
      ephemeral-storage: "20Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
      ephemeral-storage: "256Mi"
  - type: Pod
    max:
      cpu: "8"
      memory: "16Gi"
      ephemeral-storage: "40Gi"

---
# Limit Ranges for Production
apiVersion: v1
kind: LimitRange
metadata:
  name: uatp-prod-limits
  namespace: uatp-prod
spec:
  limits:
  - type: Container
    default:
      cpu: "2"
      memory: "2Gi"
      ephemeral-storage: "4Gi"
    defaultRequest:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    max:
      cpu: "8"
      memory: "16Gi"
      ephemeral-storage: "40Gi"
      nvidia.com/gpu: "2"
    min:
      cpu: "200m"
      memory: "256Mi"
      ephemeral-storage: "512Mi"
  - type: Pod
    max:
      cpu: "16"
      memory: "32Gi"
      ephemeral-storage: "80Gi"
      nvidia.com/gpu: "4"
