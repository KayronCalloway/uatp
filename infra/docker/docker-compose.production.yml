version: '3.8'

# UATP Production Docker Compose Configuration
# This configuration is optimized for production deployment with:
# - PostgreSQL database
# - Redis for caching
# - Nginx reverse proxy
# - SSL termination
# - Health checks
# - Resource limits
# - Security hardening

services:
  # ============================================================================
  # Database Service
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: uatp-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-uatp_production}
      POSTGRES_USER: ${DB_USERNAME:-uatp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - uatp-internal
    ports:
      - "127.0.0.1:5432:5432"  # Only bind to localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-uatp_user} -d ${DB_NAME:-uatp_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  # ============================================================================
  # Redis Cache Service
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: uatp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - uatp-internal
    ports:
      - "127.0.0.1:6379:6379"  # Only bind to localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # UATP Backend Service
  # ============================================================================
  uatp-backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: uatp-backend
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${DB_USERNAME:-uatp_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-uatp_production}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # Application
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}

      # Security
      UATP_SIGNING_KEY: ${UATP_SIGNING_KEY}
      UATP_AGENT_ID: ${UATP_AGENT_ID:-production-system}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # AI Services
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Ethics and Security
      UATP_ETHICS_ENABLE_REFUSAL: "true"
      UATP_ETHICS_STRICT_MODE: "true"
      UATP_SECURITY_LEVEL: "HIGH"

      # API Configuration
      API_KEYS_CONFIG: ${API_KEYS_CONFIG}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}

      # Performance
      WORKER_COUNT: ${WORKER_COUNT:-4}
      MAX_REQUESTS_PER_WORKER: 10000

      # Monitoring
      PROMETHEUS_METRICS_ENABLED: "true"
      ENABLE_AUDIT_LOGGING: "true"
    volumes:
      - app_logs:/app/logs
      - app_data:/app/data
    networks:
      - uatp-internal
    ports:
      - "127.0.0.1:8000:8000"  # Only bind to localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /app/logs:noexec,nosuid,size=500m

  # ============================================================================
  # Frontend Service (Next.js)
  # ============================================================================
  uatp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: uatp-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_UATP_API_URL: ${NEXT_PUBLIC_UATP_API_URL:-https://your-domain.com}
      NEXT_PUBLIC_UATP_API_KEY: ${NEXT_PUBLIC_UATP_API_KEY}
      NEXT_PUBLIC_ENVIRONMENT: production
    networks:
      - uatp-internal
    ports:
      - "127.0.0.1:3000:3000"  # Only bind to localhost
    depends_on:
      uatp-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:1.24-alpine
    container_name: uatp-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./ssl:/etc/ssl/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - uatp-internal
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - uatp-backend
      - uatp-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # Monitoring Services
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: uatp-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - uatp-internal
    ports:
      - "127.0.0.1:9090:9090"  # Only bind to localhost
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  grafana:
    image: grafana/grafana:latest
    container_name: uatp-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - uatp-internal
    ports:
      - "127.0.0.1:3001:3000"  # Only bind to localhost
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

# ============================================================================
# Networks
# ============================================================================
networks:
  uatp-internal:
    driver: bridge
    internal: false  # Allow external access through nginx
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/uatp/data/postgres

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/uatp/data/redis

  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/uatp/logs

  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/uatp/data/app

  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/uatp/logs/nginx

  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/uatp/data/prometheus

  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/uatp/data/grafana
