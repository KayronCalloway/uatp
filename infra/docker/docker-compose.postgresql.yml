version: '3.8'

services:
  postgresql:
    image: postgres:16-alpine
    container_name: uatp_postgresql
    environment:
      POSTGRES_DB: uatp
      POSTGRES_USER: uatp
      POSTGRES_PASSWORD: uatp
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./postgresql/init:/docker-entrypoint-initdb.d
    networks:
      - uatp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uatp -d uatp"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: uatp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - uatp_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uatp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uatp.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - uatp_network
    restart: unless-stopped
    depends_on:
      - postgresql

volumes:
  postgresql_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  uatp_network:
    driver: bridge
