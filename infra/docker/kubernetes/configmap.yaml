apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-config
  namespace: uatp-production
data:
  ENVIRONMENT: "production"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"

  # Database Configuration
  DATABASE_HOST: "postgresql-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "uatp_production"
  DATABASE_USER: "uatp_user"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"
  DB_POOL_TIMEOUT: "30"
  DB_POOL_RECYCLE: "3600"

  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Attribution Configuration
  UBA_PERCENTAGE: "0.15"
  MINIMUM_PAYOUT_THRESHOLD: "10.00"
  ATTRIBUTION_CONFIDENCE_THRESHOLD: "0.5"

  # Rate Limiting
  RATE_LIMIT_PER_MINUTE: "1000"
  RATE_LIMIT_PER_HOUR: "50000"

  # PayPal Configuration
  PAYPAL_MODE: "live"

  # File Storage
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "uatp-production-files"

  # Kubernetes
  NAMESPACE: "uatp-production"
  REPLICAS: "3"

  # Monitoring
  SENTRY_ENVIRONMENT: "production"
# ============================================
# SECRETS: See infra/docker/kubernetes/secrets.yaml.example
# DO NOT commit actual secrets to this file
# ============================================
