apiVersion: apps/v1
kind: Deployment
metadata:
  name: uatp-app
  namespace: uatp-production
  labels:
    app: uatp-app
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: uatp-app
  template:
    metadata:
      labels:
        app: uatp-app
        component: backend
    spec:
      containers:
      - name: uatp-app
        image: uatp/app:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: uatp-config
        - secretRef:
            name: uatp-secrets
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 2
          timeoutSeconds: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /startup
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 30
      initContainers:
      - name: migrate-database
        image: uatp/app:latest
        command: ['python', '-m', 'src.database.migrations', 'migrate']
        envFrom:
        - configMapRef:
            name: uatp-config
        - secretRef:
            name: uatp-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: uatp-app-service
  namespace: uatp-production
  labels:
    app: uatp-app
    component: backend
spec:
  selector:
    app: uatp-app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uatp-ingress
  namespace: uatp-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.uatp.example.com
    secretName: uatp-tls
  rules:
  - host: api.uatp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uatp-app-service
            port:
              number: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uatp-app-hpa
  namespace: uatp-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uatp-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
