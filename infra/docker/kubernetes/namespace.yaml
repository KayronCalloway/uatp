apiVersion: v1
kind: Namespace
metadata:
  name: uatp-production
  labels:
    name: uatp-production
    app: uatp
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uatp-resource-quota
  namespace: uatp-production
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "4"
    services: "10"
    secrets: "10"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: uatp-limit-range
  namespace: uatp-production
spec:
  limits:
  - default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
