---
# UATP Capsule Engine - Comprehensive Network Security Policies
# Zero-trust network segmentation for production environment

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: uatp-api-network-policy
  namespace: uatp-prod
  labels:
    app: uatp-api
    environment: production
    security.uatp.ai/type: network-security
    security.uatp.ai/version: "2.0"
  annotations:
    description: "Comprehensive network policy for UATP API pods with zero-trust principles"
spec:
  podSelector:
    matchLabels:
      app: uatp-api
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow ingress from NGINX Ingress Controller only
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000  # Application port
    - protocol: TCP
      port: 9090  # Metrics port
  
  # Allow ingress from monitoring namespace for metrics collection
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090  # Metrics endpoint
  
  # Allow health checks from load balancer
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - podSelector:
        matchLabels:
          app: nginx-ingress-controller
    ports:
    - protocol: TCP
      port: 8000
      
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  
  # Allow connection to PostgreSQL database
  - to:
    - podSelector:
        matchLabels:
          app: postgresql
    ports:
    - protocol: TCP
      port: 5432
  
  # Allow connection to Redis cache
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  
  # Allow HTTPS egress for external APIs (OpenAI, etc.)
  - to: []  # Any destination
    ports:
    - protocol: TCP
      port: 443
  
  # Allow HTTP egress for webhooks and integrations (limited)
  - to: []
    ports:
    - protocol: TCP
      port: 80

---
# Database Network Policy - Strict database access control
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: uatp-database-network-policy
  namespace: uatp-prod
  labels:
    app: postgresql
    environment: production
    security.uatp.ai/type: database-security
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Only allow connections from UATP API pods
  - from:
    - podSelector:
        matchLabels:
          app: uatp-api
    ports:
    - protocol: TCP
      port: 5432
  
  # Allow connections from backup/maintenance pods
  - from:
    - podSelector:
        matchLabels:
          app: database-backup
    ports:
    - protocol: TCP
      port: 5432
  
  egress:
  # Allow DNS resolution only
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# Redis Cache Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: uatp-redis-network-policy
  namespace: uatp-prod
  labels:
    app: redis
    environment: production
    security.uatp.ai/type: cache-security
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Only allow connections from UATP API pods
  - from:
    - podSelector:
        matchLabels:
          app: uatp-api
    ports:
    - protocol: TCP
      port: 6379
  
  egress:
  # Minimal egress - DNS resolution only
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
# Monitoring Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: uatp-monitoring-network-policy
  namespace: uatp-prod
  labels:
    app: monitoring
    environment: production
    security.uatp.ai/type: monitoring-security
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow access from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  
  # Allow connection to Prometheus
  - to:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090

---
# Default Deny All Policy - Fallback security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: uatp-default-deny-all
  namespace: uatp-prod
  labels:
    security.uatp.ai/type: default-deny
    security.uatp.ai/priority: "low"
  annotations:
    description: "Default deny-all policy as security fallback. This policy has low priority and should be overridden by specific policies."
spec:
  podSelector: {}  # Applies to all pods in namespace
  policyTypes:
  - Ingress
  - Egress
  # No ingress/egress rules = deny all

---
# Network Policy for Cross-Namespace Communication Control
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: uatp-cross-namespace-policy
  namespace: uatp-prod
  labels:
    security.uatp.ai/type: cross-namespace-control
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Explicitly allow ingress from specific namespaces only
  - from:
    - namespaceSelector:
        matchLabels:
          security.uatp.ai/trusted: "true"
  
  egress:
  # Allow egress to trusted namespaces only
  - to:
    - namespaceSelector:
        matchLabels:
          security.uatp.ai/trusted: "true"

---
# Network Policy Validation ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-network-policy-config
  namespace: uatp-prod
  labels:
    security.uatp.ai/type: policy-config
data:
  network-policy.yaml: |
    # Network Security Policy Configuration
    policies:
      - name: "zero-trust-principle"
        description: "Default deny all, explicit allow required communications only"
        enforcement: "strict"
      
      - name: "database-isolation"
        description: "Database pods only accessible from application pods"
        enforcement: "strict"
      
      - name: "external-egress-control"
        description: "External egress limited to HTTPS and specific endpoints"
        enforcement: "monitor"
      
      - name: "cross-namespace-restriction"
        description: "Cross-namespace communication requires explicit trust labels"
        enforcement: "strict"
    
    monitoring:
      enabled: true
      alerting: true
      log_violations: true