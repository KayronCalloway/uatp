---
apiVersion: v1
kind: Service
metadata:
  name: uatp-api-service
  namespace: uatp-dev
  labels:
    app: uatp-api
    environment: development
spec:
  selector:
    app: uatp-api
    environment: development
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: health
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP

