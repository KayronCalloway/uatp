---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uatp-api
  namespace: uatp-prod
  labels:
    app: uatp-api
    environment: production
    version: v1
    tier: backend
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "UATP API Production Deployment"
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: uatp-api
      environment: production
  template:
    metadata:
      labels:
        app: uatp-api
        environment: production
        version: v1
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: uatp-service-account
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      
      # Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups: [1000]
      
      # Node Selection with Performance Optimization
      nodeSelector:
        kubernetes.io/arch: amd64
        node-type: application
        performance-tier: high
        storage-type: ssd
      
      # Anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - uatp-api
            topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: node-type
                operator: In
                values:
                - application
      
      # Tolerations for dedicated nodes
      tolerations:
      - key: "uatp-dedicated"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      # Init containers
      initContainers:
      - name: wait-for-db
        image: postgres:15-alpine
        command: ['sh', '-c', 'until pg_isready -h $DATABASE_HOST -p $DATABASE_PORT -U $DATABASE_USER; do echo waiting for database; sleep 2; done;']
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: uatp-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: uatp-config
              key: DATABASE_PORT
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: uatp-secrets
              key: DATABASE_USER
        resources:
          limits:
            memory: "64Mi"
            cpu: "50m"
          requests:
            memory: "32Mi"
            cpu: "25m"
      
      - name: run-migrations
        image: uatp-capsule-engine:production
        command: ['python', '-m', 'alembic', 'upgrade', 'head']
        envFrom:
        - configMapRef:
            name: uatp-config
        - secretRef:
            name: uatp-secrets
        resources:
          limits:
            memory: "512Mi"
            cpu: "200m"
          requests:
            memory: "256Mi"
            cpu: "100m"
      
      containers:
      - name: uatp-api
        image: uatp-capsule-engine:production
        imagePullPolicy: IfNotPresent
        
        # Ports
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        # Environment with Performance Optimizations
        env:
        - name: PORT
          value: "8000"
        - name: PROMETHEUS_PORT
          value: "9090"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        # Performance tuning
        - name: UVICORN_WORKERS
          value: "4"
        - name: UVICORN_BACKLOG
          value: "2048"
        - name: DATABASE_POOL_SIZE
          value: "20"
        - name: DATABASE_MAX_OVERFLOW
          value: "10"
        - name: REDIS_CONNECTION_POOL_SIZE
          value: "50"
        - name: CACHE_TTL
          value: "300"
        - name: ENABLE_PERFORMANCE_MONITORING
          value: "true"
        
        envFrom:
        - configMapRef:
            name: uatp-config
        - secretRef:
            name: uatp-secrets
        
        # Optimized Resource limits
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
            ephemeral-storage: "1Gi"
            # GPU support for AI workloads (optional)
            nvidia.com/gpu: 0
          limits:
            memory: "2Gi"
            cpu: "2000m"
            ephemeral-storage: "4Gi"
            nvidia.com/gpu: 1
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
            httpHeaders:
            - name: Host
              value: localhost
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            httpHeaders:
            - name: Host
              value: localhost
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
          successThreshold: 1
        
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        
        # Volume mounts
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /app/logs
        - name: cache-volume
          mountPath: /app/cache
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        
        # Lifecycle hooks
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      
      # Volumes
      volumes:
      - name: tmp-volume
        emptyDir:
          sizeLimit: 500Mi
      - name: logs-volume
        emptyDir:
          sizeLimit: 1Gi
      - name: cache-volume
        emptyDir:
          sizeLimit: 500Mi
      - name: config-volume
        configMap:
          name: uatp-app-config
          defaultMode: 0644

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: uatp-api-pdb
  namespace: uatp-prod
  labels:
    app: uatp-api
    environment: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: uatp-api
      environment: production

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uatp-api-hpa
  namespace: uatp-prod
  labels:
    app: uatp-api
    environment: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uatp-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "1k"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60