---
apiVersion: v1
kind: Namespace
metadata:
  name: uatp-prod
  labels:
    name: uatp-prod
    environment: production
    managed-by: kubernetes
  annotations:
    description: "UATP Production Environment"
    contact: "team@uatp.com"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: uatp-prod-limits
  namespace: uatp-prod
spec:
  limits:
  - default:
      cpu: "1000m"
      memory: "2Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
  - max:
      cpu: "4000m"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uatp-prod-quota
  namespace: uatp-prod
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    persistentvolumeclaims: "10"
    secrets: "20"
    configmaps: "20"
    services: "10"