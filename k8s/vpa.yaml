---
# Vertical Pod Autoscaler for UATP API - Development
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: uatp-api-vpa
  namespace: uatp-dev
  labels:
    app: uatp-api
    environment: development
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uatp-api
  updatePolicy:
    updateMode: "Auto"
    minReplicas: 2
  resourcePolicy:
    containerPolicies:
    - containerName: uatp-api
      minAllowed:
        cpu: 100m
        memory: 128Mi
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits

---
# Vertical Pod Autoscaler for UATP API - Staging
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: uatp-api-vpa
  namespace: uatp-staging
  labels:
    app: uatp-api
    environment: staging
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uatp-api
  updatePolicy:
    updateMode: "Auto"
    minReplicas: 3
  resourcePolicy:
    containerPolicies:
    - containerName: uatp-api
      minAllowed:
        cpu: 250m
        memory: 256Mi
      maxAllowed:
        cpu: 4000m
        memory: 8Gi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits

---
# Vertical Pod Autoscaler for UATP API - Production
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: uatp-api-vpa
  namespace: uatp-prod
  labels:
    app: uatp-api
    environment: production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uatp-api
  updatePolicy:
    updateMode: "Initial"  # Only apply at pod creation, not during updates
    minReplicas: 3
  resourcePolicy:
    containerPolicies:
    - containerName: uatp-api
      minAllowed:
        cpu: 200m
        memory: 512Mi
      maxAllowed:
        cpu: 8000m
        memory: 16Gi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits

