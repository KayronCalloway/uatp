---
# UATP Capsule Engine - Pod Security Standards and Policies
# Comprehensive security hardening for pod specifications

apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-security-context-policy
  namespace: uatp-prod
  labels:
    security.uatp.ai/type: pod-security-policy
    security.uatp.ai/version: "2.0"
data:
  security-requirements.yaml: |
    # Pod Security Context Requirements
    securityContext:
      # Run as non-root user
      runAsNonRoot: true
      runAsUser: 65534  # nobody user
      runAsGroup: 65534 # nobody group
      
      # Filesystem permissions
      fsGroup: 65534
      fsGroupChangePolicy: "OnRootMismatch"
      
      # Security options
      seccompProfile:
        type: RuntimeDefault
      
    # Container Security Context Requirements
    containerSecurityContext:
      # Privilege restrictions
      allowPrivilegeEscalation: false
      privileged: false
      
      # Capabilities
      capabilities:
        drop:
        - ALL
        add: []  # No capabilities added by default
      
      # Filesystem
      readOnlyRootFilesystem: true
      
      # User restrictions
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      
      # Security profiles
      seccompProfile:
        type: RuntimeDefault

---
# Pod Security Standards - Restricted Profile
apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-pod-security-standards
  namespace: uatp-prod
  labels:
    security.uatp.ai/profile: restricted
data:
  pod-security-policy.yaml: |
    # Kubernetes Pod Security Standards - Restricted Profile
    apiVersion: v1
    kind: Pod
    metadata:
      annotations:
        # Enforce restricted security profile
        pod-security.kubernetes.io/enforce: restricted
        pod-security.kubernetes.io/audit: restricted
        pod-security.kubernetes.io/warn: restricted
        
        # Security scanning annotations
        security.uatp.ai/scanned: "true"
        security.uatp.ai/scanner: "trivy"
        security.uatp.ai/last-scan: "2025-01-01T00:00:00Z"
        
    spec:
      # Security Context - Pod Level
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups: []
      
      # Service Account
      serviceAccountName: uatp-service-account
      automountServiceAccountToken: false  # Explicit control
      
      # DNS Policy
      dnsPolicy: ClusterFirst
      
      # Container specifications
      containers:
      - name: uatp-api
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        
        # Resource limits and requests
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
            ephemeral-storage: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
            ephemeral-storage: "1Gi"
        
        # Volume mounts - read-only where possible
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
          readOnly: false
        - name: app-cache
          mountPath: /app/cache
          readOnly: false
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      # Volumes
      volumes:
      - name: tmp-volume
        emptyDir:
          sizeLimit: "1Gi"
      - name: app-cache
        emptyDir:
          sizeLimit: "2Gi"
      - name: config-volume
        configMap:
          name: uatp-config
          defaultMode: 0444  # Read-only
      
      # Pod-level constraints
      nodeSelector:
        kubernetes.io/os: linux
        security.uatp.ai/trusted: "true"
      
      tolerations: []  # No tolerations by default
      
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: security.uatp.ai/zone
                operator: In
                values: ["secure"]
        
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values: ["uatp-api"]
              topologyKey: kubernetes.io/hostname

---
# Network Security for Pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-network-security-config
  namespace: uatp-prod
data:
  network-security.yaml: |
    # Network security configuration for pods
    networkSecurity:
      # Ingress restrictions
      ingress:
        allowedPorts: [8000, 9090]  # App port, metrics port
        allowedProtocols: ["TCP"]
        sourceRestriction: "cluster-internal"
      
      # Egress restrictions
      egress:
        allowedDestinations:
          - "dns:53"              # DNS resolution
          - "postgresql:5432"     # Database
          - "redis:6379"          # Cache
          - "https:443"           # External APIs
        blockedDestinations:
          - "metadata-service"    # Block cloud metadata
          - "internal-networks"   # Block internal scanning
      
      # Security monitoring
      monitoring:
        enabled: true
        logConnections: true
        alertOnViolations: true

---
# Admission Controller Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-admission-policy
  namespace: uatp-prod
  labels:
    security.uatp.ai/type: admission-policy
data:
  admission-policy.yaml: |
    # Admission Controller Security Policies
    policies:
      - name: "require-security-context"
        description: "All pods must have proper security context"
        action: "reject"
        rules:
          - field: "spec.securityContext.runAsNonRoot"
            required: true
            value: true
          - field: "spec.containers[*].securityContext.allowPrivilegeEscalation"
            required: true
            value: false
      
      - name: "require-resource-limits"
        description: "All containers must have resource limits"
        action: "reject"
        rules:
          - field: "spec.containers[*].resources.limits.cpu"
            required: true
          - field: "spec.containers[*].resources.limits.memory"
            required: true
      
      - name: "require-readonly-filesystem"
        description: "Containers should use read-only root filesystem"
        action: "warn"
        rules:
          - field: "spec.containers[*].securityContext.readOnlyRootFilesystem"
            required: true
            value: true
      
      - name: "block-privileged-containers"
        description: "Privileged containers are not allowed"
        action: "reject"
        rules:
          - field: "spec.containers[*].securityContext.privileged"
            forbidden: true
      
      - name: "require-image-scanning"
        description: "Container images must be scanned for vulnerabilities"
        action: "reject"
        rules:
          - field: "metadata.annotations['security.uatp.ai/scanned']"
            required: true
            value: "true"

---
# Security Monitoring and Alerting
apiVersion: v1
kind: ConfigMap
metadata:
  name: uatp-security-monitoring
  namespace: uatp-prod
data:
  monitoring-config.yaml: |
    # Security monitoring configuration
    monitoring:
      # Pod security violations
      podSecurity:
        enabled: true
        alerts:
          - name: "privileged-pod-detected"
            condition: "spec.containers[*].securityContext.privileged == true"
            severity: "critical"
          - name: "root-user-detected"
            condition: "spec.securityContext.runAsUser == 0"
            severity: "high"
          - name: "host-network-access"
            condition: "spec.hostNetwork == true"
            severity: "high"
      
      # Network policy violations
      networkSecurity:
        enabled: true
        alerts:
          - name: "unauthorized-network-access"
            condition: "network_policy_violation == true"
            severity: "medium"
          - name: "external-egress-detected"
            condition: "egress_external == true"
            severity: "low"
      
      # Resource usage monitoring
      resources:
        enabled: true
        thresholds:
          cpu: "80%"
          memory: "85%"
          storage: "90%"
    
    # Incident response
    incidentResponse:
      enabled: true
      autoRemediation:
        - action: "isolate-pod"
          trigger: "critical-security-violation"
        - action: "scale-down"
          trigger: "resource-exhaustion"
      
      notifications:
        - channel: "security-alerts"
          severity: ["critical", "high"]
        - channel: "ops-team"
          severity: ["medium", "low"]