---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uatp-api-ingress
  namespace: uatp-dev
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-Requested-With"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  rules:
  - host: dev-api.uatp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uatp-api-service
            port:
              number: 80
  - host: dev-health.uatp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uatp-api-service
            port:
              number: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uatp-api-ingress
  namespace: uatp-staging
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://staging.uatp.ai"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-Requested-With"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/rate-limit: "5000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - staging-api.uatp.ai
    secretName: uatp-staging-tls
  rules:
  - host: staging-api.uatp.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uatp-api-service
            port:
              number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uatp-api-ingress
  namespace: uatp-prod
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Secure CORS Configuration
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://uatp.ai,https://app.uatp.ai"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-Requested-With, X-CSRF-Token"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    # Enhanced rate limiting for production
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Comprehensive Security Headers for Production
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # Core security headers
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
      
      # Enhanced Content Security Policy
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; media-src 'none'; object-src 'none'; child-src 'none'; worker-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'";
      
      # Modern security headers
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=(), payment=()";
      more_set_headers "Cross-Origin-Embedder-Policy: require-corp";
      more_set_headers "Cross-Origin-Opener-Policy: same-origin";
      more_set_headers "Cross-Origin-Resource-Policy: same-origin";
      
      # Hide server information
      more_clear_headers "Server";
      more_clear_headers "X-Powered-By";
      
      # Security logging
      access_log /var/log/nginx/security-access.log combined;
spec:
  tls:
  - hosts:
    - api.uatp.ai
    - uatp.ai
    secretName: uatp-prod-tls
  rules:
  - host: api.uatp.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uatp-api-service
            port:
              number: 80
  - host: uatp.ai
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: uatp-api-service
            port:
              number: 80
