repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: ["--fix"]
        exclude: ^(archive/|infra/monitoring/dashboards/|tests/legacy/|scripts/legacy_fixes/)
      - id: ruff-format
        exclude: ^(archive/|infra/monitoring/dashboards/|tests/legacy/|scripts/legacy_fixes/)
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        exclude: ^(archive/|scripts/legacy_fixes/)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
