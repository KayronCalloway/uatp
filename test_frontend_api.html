<!DOCTYPE html>
<html>
<head>
    <title>Test Frontend API Connection</title>
</head>
<body>
    <h1>UATP Frontend API Test</h1>
    <button onclick="testHealthEndpoint()">Test Health Endpoint</button>
    <button onclick="testCapsulesEndpoint()">Test Capsules Endpoint</button>
    <button onclick="testSpecificCapsule()">Test Specific Capsule</button>
    <br><br>
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:9090';
        const API_KEY = 'dev-key-001';

        function displayResult(title, data) {
            const results = document.getElementById('results');
            results.innerHTML += `<h3>${title}</h3><pre>${JSON.stringify(data, null, 2)}</pre><hr>`;
        }

        async function testHealthEndpoint() {
            try {
                const response = await fetch(`${API_BASE}/health`, {
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                displayResult('Health Endpoint', { status: response.status, data });
            } catch (error) {
                displayResult('Health Endpoint Error', { error: error.message });
            }
        }

        async function testCapsulesEndpoint() {
            try {
                const response = await fetch(`${API_BASE}/capsules?limit=3`, {
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                displayResult('Capsules Endpoint', { status: response.status, data });
            } catch (error) {
                displayResult('Capsules Endpoint Error', { error: error.message });
            }
        }

        async function testSpecificCapsule() {
            try {
                const response = await fetch(`${API_BASE}/capsules/caps_2025_07_15_2db34b7093304fc6`, {
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                displayResult('Specific Capsule', { status: response.status, data });
            } catch (error) {
                displayResult('Specific Capsule Error', { error: error.message });
            }
        }
    </script>
</body>
</html>
