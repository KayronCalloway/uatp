version: '3.8'

services:
  # PostgreSQL Database
  # SECURITY: Internal service - no host port exposure in production
  postgres:
    image: postgres:15-alpine
    container_name: uatp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - generate with: openssl rand -base64 32}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    # SECURITY: No ports exposed to host - access only via internal network
    # ports:
    #   - "${DB_PORT:-5432}:5432"  # REMOVED: Internal service only
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uatp_network

  # Redis for caching and session storage
  # SECURITY: Internal service - no host port exposure in production
  redis:
    image: redis:7-alpine
    container_name: uatp_redis
    restart: unless-stopped
    # SECURITY: No ports exposed to host - access only via internal network
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"  # REMOVED: Internal service only
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required - generate with: openssl rand -base64 32}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uatp_network

  # Main UATP Application
  uatp_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uatp_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    # SECURITY: Metrics only via internal network or explicit exposure
    # Note: Health checks are served on the main port (8000), not a separate port
    expose:
      - "9090"  # Metrics - internal only (expose via reverse proxy if needed)
    environment:
      # Database - SECURITY: All credentials required, no defaults
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

      # Redis - SECURITY: Password required
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

      # Application
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Security - SECURITY: All secrets required, no defaults
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required - generate with: python -c "import secrets; print(secrets.token_urlsafe(64))"}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required - generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required - set to your domain(s)}

      # API Configuration - SECURITY: No localhost defaults in production
      API_VERSION: v1
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required - set to your frontend domain(s)}

    volumes:
      - app_logs:/app/logs
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - uatp_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: uatp_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - uatp_app
    networks:
      - uatp_network

  # Monitoring - Prometheus
  # SECURITY: Internal monitoring service
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: uatp_prometheus
    restart: unless-stopped
    # SECURITY: No host port exposure - access via Grafana or reverse proxy
    # ports:
    #   - "${PROMETHEUS_PORT:-9091}:9090"  # REMOVED: Internal service only
    expose:
      - "9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      - uatp_app
    networks:
      - uatp_network

  # Monitoring - Grafana
  # SECURITY: Consider exposing only via reverse proxy with auth
  grafana:
    image: grafana/grafana:10.1.0
    container_name: uatp_grafana
    restart: unless-stopped
    # SECURITY: Internal only - expose via reverse proxy if needed
    # ports:
    #   - "${GRAFANA_PORT:-3000}:3000"  # REMOVED: Expose via nginx if needed
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required - use a strong password}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - uatp_network

  # Log Management - ELK Stack (optional)
  # SECURITY: Enable xpack security and require password
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: uatp_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      # SECURITY: Enable authentication
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required for Elasticsearch}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    # SECURITY: No host port exposure - internal only
    # ports:
    #   - "${ELASTICSEARCH_PORT:-9200}:9200"  # REMOVED: Internal service only
    expose:
      - "9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - uatp_network
    profiles:
      - monitoring

  # Database Backup Service
  backup:
    image: postgres:15-alpine
    container_name: uatp_backup
    restart: unless-stopped
    environment:
      # SECURITY: Credentials required - inherited from main config
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        chmod +x /usr/local/bin/backup.sh &&
        echo '0 2 * * * /usr/local/bin/backup.sh' | crontab - &&
        crond -f -L /dev/stdout
      "
    networks:
      - uatp_network

networks:
  uatp_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_data:
  nginx_logs:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  backups:
