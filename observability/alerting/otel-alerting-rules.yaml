# OpenTelemetry Alerting Rules for UATP
groups:
- name: uatp.opentelemetry.rules
  interval: 30s
  rules:
  
  # Service Health Alerts
  - alert: UATPServiceDown
    expr: up{service_name="uatp-capsule-engine"} == 0
    for: 1m
    labels:
      severity: critical
      service: uatp-capsule-engine
      alert_type: availability
    annotations:
      summary: "UATP Capsule Engine service is down"
      description: "The UATP Capsule Engine service has been down for more than 1 minute"
      runbook_url: "https://docs.uatp.ai/runbooks/service-down"

  # HTTP Performance Alerts
  - alert: UATPHighLatency
    expr: histogram_quantile(0.95, rate(uatp_http_request_duration_seconds_bucket[5m])) > 0.5
    for: 5m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: performance
    annotations:
      summary: "UATP API high latency detected"
      description: "95th percentile latency is {{ $value }}s, above 500ms threshold"
      runbook_url: "https://docs.uatp.ai/runbooks/high-latency"

  - alert: UATPCriticalLatency
    expr: histogram_quantile(0.95, rate(uatp_http_request_duration_seconds_bucket[5m])) > 2.0
    for: 2m
    labels:
      severity: critical
      service: uatp-capsule-engine
      alert_type: performance
    annotations:
      summary: "UATP API critical latency detected"
      description: "95th percentile latency is {{ $value }}s, above 2s critical threshold"
      runbook_url: "https://docs.uatp.ai/runbooks/critical-latency"

  - alert: UATPHighErrorRate
    expr: (rate(uatp_http_errors_total[5m]) / rate(uatp_http_requests_total[5m])) * 100 > 5
    for: 3m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: reliability
    annotations:
      summary: "UATP API high error rate"
      description: "Error rate is {{ $value }}%, above 5% threshold"
      runbook_url: "https://docs.uatp.ai/runbooks/high-error-rate"

  - alert: UATPCriticalErrorRate
    expr: (rate(uatp_http_errors_total[5m]) / rate(uatp_http_requests_total[5m])) * 100 > 15
    for: 1m
    labels:
      severity: critical
      service: uatp-capsule-engine
      alert_type: reliability
    annotations:
      summary: "UATP API critical error rate"
      description: "Error rate is {{ $value }}%, above 15% critical threshold"
      runbook_url: "https://docs.uatp.ai/runbooks/critical-error-rate"

  # Capsule Operation Alerts
  - alert: UATPCapsuleCreationFailures
    expr: rate(uatp_capsule_operations_total{operation_type="create",success="false"}[5m]) > 0.1
    for: 5m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: business_logic
      component: capsule_engine
    annotations:
      summary: "High capsule creation failure rate"
      description: "Capsule creation failures at {{ $value }} failures/sec"
      runbook_url: "https://docs.uatp.ai/runbooks/capsule-creation-failures"

  - alert: UATPSlowCapsuleCreation
    expr: histogram_quantile(0.95, rate(uatp_capsule_creation_duration_seconds_bucket[5m])) > 10
    for: 5m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: performance
      component: capsule_engine
    annotations:
      summary: "Slow capsule creation detected"
      description: "95th percentile capsule creation time is {{ $value }}s"
      runbook_url: "https://docs.uatp.ai/runbooks/slow-capsule-creation"

  # Attribution System Alerts
  - alert: UATPAttributionTrackingFailures
    expr: rate(uatp_attribution_tracks_total{success="false"}[5m]) > 0.05
    for: 5m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: business_logic
      component: attribution_system
    annotations:
      summary: "High attribution tracking failure rate"
      description: "Attribution tracking failures at {{ $value }} failures/sec"
      runbook_url: "https://docs.uatp.ai/runbooks/attribution-failures"

  # Economic System Alerts
  - alert: UATPEconomicCalculationFailures
    expr: rate(uatp_economic_calculations_total{success="false"}[5m]) > 0.01
    for: 3m
    labels:
      severity: critical
      service: uatp-capsule-engine
      alert_type: business_logic
      component: economic_engine
    annotations:
      summary: "Economic calculation failures detected"
      description: "Economic calculation failures at {{ $value }} failures/sec"
      runbook_url: "https://docs.uatp.ai/runbooks/economic-failures"

  # Database Alerts
  - alert: UATPDatabaseConnectionPoolExhaustion
    expr: uatp_database_connections_active > 80
    for: 2m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: resource
      component: database
    annotations:
      summary: "Database connection pool near exhaustion"
      description: "Active database connections: {{ $value }}"
      runbook_url: "https://docs.uatp.ai/runbooks/db-connection-pool"

  - alert: UATPDatabaseOperationFailures
    expr: rate(uatp_database_operations_total{success="false"}[5m]) > 0.1
    for: 3m
    labels:
      severity: critical
      service: uatp-capsule-engine
      alert_type: infrastructure
      component: database
    annotations:
      summary: "High database operation failure rate"
      description: "Database operation failures at {{ $value }} failures/sec"
      runbook_url: "https://docs.uatp.ai/runbooks/db-operation-failures"

  # Resource Alerts
  - alert: UATPHighMemoryUsage
    expr: uatp_memory_usage_bytes > 1.5e9  # 1.5GB
    for: 5m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: resource
    annotations:
      summary: "High memory usage detected"
      description: "Memory usage is {{ $value | humanize }}B"
      runbook_url: "https://docs.uatp.ai/runbooks/high-memory-usage"

  - alert: UATPCriticalMemoryUsage
    expr: uatp_memory_usage_bytes > 1.8e9  # 1.8GB (close to 2GB limit)
    for: 2m
    labels:
      severity: critical
      service: uatp-capsule-engine
      alert_type: resource
    annotations:
      summary: "Critical memory usage detected"
      description: "Memory usage is {{ $value | humanize }}B, approaching limit"
      runbook_url: "https://docs.uatp.ai/runbooks/critical-memory-usage"

  # Cache Performance Alerts
  - alert: UATPLowCacheHitRate
    expr: (rate(uatp_cache_operations_total{hit="true"}[5m]) / rate(uatp_cache_operations_total[5m])) * 100 < 70
    for: 10m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: performance
      component: cache
    annotations:
      summary: "Low cache hit rate detected"
      description: "Cache hit rate is {{ $value }}%, below 70% threshold"
      runbook_url: "https://docs.uatp.ai/runbooks/low-cache-hit-rate"

  # Business Logic Alerts
  - alert: UATPTrustScoreAnomalies
    expr: |
      (
        histogram_quantile(0.95, rate(uatp_trust_scores_bucket[1h])) - 
        histogram_quantile(0.95, rate(uatp_trust_scores_bucket[1h] offset 24h))
      ) / histogram_quantile(0.95, rate(uatp_trust_scores_bucket[1h] offset 24h)) * 100 > 50
    for: 15m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: business_logic
      component: trust_system
    annotations:
      summary: "Trust score anomalies detected"
      description: "Trust scores have changed significantly compared to 24h ago"
      runbook_url: "https://docs.uatp.ai/runbooks/trust-score-anomalies"

  - alert: UATPVerificationFailures
    expr: rate(uatp_verifications_total{result="failed"}[5m]) > 0.05
    for: 5m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: security
      component: verification_system
    annotations:
      summary: "High verification failure rate"
      description: "Verification failures at {{ $value }} failures/sec"
      runbook_url: "https://docs.uatp.ai/runbooks/verification-failures"

- name: uatp.opentelemetry.tracing.rules
  interval: 30s
  rules:

  # Distributed Tracing Alerts
  - alert: UATPHighTraceErrorRate
    expr: (rate(traces_received_total{status="error"}[5m]) / rate(traces_received_total[5m])) * 100 > 10
    for: 5m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: tracing
    annotations:
      summary: "High trace error rate detected"
      description: "Trace error rate is {{ $value }}%"
      runbook_url: "https://docs.uatp.ai/runbooks/high-trace-error-rate"

  - alert: UATPTraceSamplingDrop
    expr: rate(traces_dropped_total[5m]) > 100
    for: 3m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: observability
    annotations:
      summary: "High trace sampling drop rate"
      description: "Traces being dropped at {{ $value }} traces/sec due to sampling"
      runbook_url: "https://docs.uatp.ai/runbooks/trace-sampling-drop"

  - alert: UATPSlowSpans
    expr: histogram_quantile(0.95, rate(span_duration_seconds_bucket[5m])) > 5
    for: 5m
    labels:
      severity: warning
      service: uatp-capsule-engine
      alert_type: performance
    annotations:
      summary: "Slow spans detected in traces"
      description: "95th percentile span duration is {{ $value }}s"
      runbook_url: "https://docs.uatp.ai/runbooks/slow-spans"

- name: uatp.opentelemetry.collector.rules
  interval: 30s
  rules:

  # OpenTelemetry Collector Health
  - alert: UATPOtelCollectorDown
    expr: up{job="uatp-otel-collector"} == 0
    for: 1m
    labels:
      severity: critical
      service: otel-collector
      alert_type: infrastructure
    annotations:
      summary: "OpenTelemetry Collector is down"
      description: "The OpenTelemetry Collector has been down for more than 1 minute"
      runbook_url: "https://docs.uatp.ai/runbooks/otel-collector-down"

  - alert: UATPOtelCollectorHighMemory
    expr: process_resident_memory_bytes{job="uatp-otel-collector"} > 1e9  # 1GB
    for: 5m
    labels:
      severity: warning
      service: otel-collector
      alert_type: resource
    annotations:
      summary: "OpenTelemetry Collector high memory usage"
      description: "Collector memory usage is {{ $value | humanize }}B"
      runbook_url: "https://docs.uatp.ai/runbooks/otel-collector-memory"

  - alert: UATPOtelCollectorExportFailures
    expr: rate(otelcol_exporter_send_failed_metric_points_total[5m]) > 10
    for: 3m
    labels:
      severity: warning
      service: otel-collector
      alert_type: export
    annotations:
      summary: "OpenTelemetry Collector export failures"
      description: "Collector failing to export at {{ $value }} failures/sec"
      runbook_url: "https://docs.uatp.ai/runbooks/otel-export-failures"