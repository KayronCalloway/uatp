# OpenTelemetry Collector Configuration for UATP
# Complete observability solution with metrics, traces, and logs

receivers:
  # OTLP receiver for applications
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:*"
            - "https://*.uatp.ai"
          allowed_headers:
            - "*"

  # Prometheus receiver for legacy metrics
  prometheus:
    config:
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: 'otel-collector'
          static_configs:
            - targets: ['0.0.0.0:8888']
        - job_name: 'uatp-api'
          static_configs:
            - targets: ['uatp-api-service:9090']
          metrics_path: '/metrics'
          scrape_interval: 30s
        - job_name: 'kubernetes-pods'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)

  # Jaeger receiver for existing traces
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268
      thrift_compact:
        endpoint: 0.0.0.0:6831

  # Zipkin receiver for compatibility
  zipkin:
    endpoint: 0.0.0.0:9411

  # Kubernetes cluster receiver for infrastructure metrics
  k8s_cluster:
    auth_type: serviceAccount
    node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
    allocatable_types_to_report: [cpu, memory, storage]

  # Host metrics receiver for node-level metrics
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk:
        include_devices:
          match_type: regexp
          devices: ['^/dev/.*']
      network:
        include:
          interfaces:
            match_type: regexp
            interfaces: ['.*']
      filesystem:
        include_mount_points:
          match_type: regexp
          mount_points: ['^/.*']
        exclude_fs_types:
          match_type: strict
          fs_types: [proc, sysfs, tmpfs, devtmpfs, devpts, squashfs, overlay]

  # File log receiver for application logs
  filelog:
    include:
      - /var/log/uatp/*.log
      - /var/log/containers/*uatp*.log
    operators:
      - type: json_parser
        id: json_parser
        parse_from: attributes.message
        parse_to: attributes
      - type: move
        from: attributes.message
        to: body
      - type: add
        field: attributes.service_name
        value: "uatp-capsule-engine"

processors:
  # Memory limiter to prevent OOM
  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s

  # Batch processor for performance
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Resource processor to add consistent attributes
  resource:
    attributes:
      - key: service.name
        value: uatp-capsule-engine
        action: upsert
      - key: service.version
        from_attribute: service_version
        action: insert
      - key: deployment.environment
        from_attribute: environment
        action: insert
      - key: k8s.cluster.name
        value: uatp-production
        action: upsert

  # Attributes processor for custom business metrics
  attributes:
    actions:
      - key: capsule.type
        action: upsert
        from_attribute: capsule_type
      - key: attribution.chain_id
        action: upsert
        from_attribute: chain_id
      - key: economic.dividend_enabled
        action: upsert
        from_attribute: dividend_enabled

  # Span processor for distributed tracing enhancement
  span:
    name:
      from_attributes: [http.method, http.route]
      separator: " "

  # Probabilistic sampler for trace volume management
  probabilistic_sampler:
    sampling_percentage: 10.0

  # Tail sampling for intelligent trace retention
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 10
    policies:
      - name: errors_policy
        type: status_code
        status_code: {status_codes: [ERROR]}
      - name: slow_requests_policy
        type: latency
        latency: {threshold_ms: 500}
      - name: capsule_operations_policy
        type: string_attribute
        string_attribute: {key: operation.type, values: [capsule_create, capsule_merge, attribution_track]}
      - name: probabilistic_policy
        type: probabilistic
        probabilistic: {sampling_percentage: 5}

  # Transform processor for metric normalization
  transform:
    metric_statements:
      - context: metric
        statements:
          - set(description, "UATP normalized metric") where name == "uatp_requests_total"
          - set(unit, "1") where name == "uatp_requests_total"

  # Filter processor to exclude noisy metrics
  filter:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - ".*grpc_io.*"
          - ".*http_client_.*"

exporters:
  # Prometheus exporter for metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: uatp
    const_labels:
      service: uatp-capsule-engine
      environment: production
    resource_to_telemetry_conversion:
      enabled: true
    enable_open_metrics: true

  # OTLP exporter for Jaeger (traces)
  otlp/jaeger:
    endpoint: jaeger-collector:4317
    tls:
      insecure: true
    headers:
      "jaeger-debug-threshold": "0.1"

  # OTLP exporter for additional backend
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Logging exporter for debugging
  logging:
    loglevel: info
    sampling_initial: 5
    sampling_thereafter: 200

  # Elasticsearch exporter for logs
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    index: "uatp-logs"
    mapping:
      mode: "none"
    timeout: 30s

  # Remote write for Prometheus-compatible backends
  prometheusremotewrite:
    endpoint: "http://prometheus-server:9090/api/v1/write"
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

  # Cloud exporters (configured via environment variables)
  otlp/datadog:
    endpoint: "https://api.datadoghq.com"
    headers:
      "DD-API-KEY": "${DD_API_KEY}"
    tls:
      insecure: false

  otlp/newrelic:
    endpoint: "https://otlp.nr-data.net:4317"
    headers:
      "api-key": "${NEW_RELIC_LICENSE_KEY}"
    tls:
      insecure: false

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133

  # Performance profiling
  pprof:
    endpoint: 0.0.0.0:1777

  # Memory ballast for stability
  memory_ballast:
    size_mib: 165

  # File storage extension for trace buffering
  file_storage:
    directory: /tmp/otel-data
    timeout: 10s

  # Kubernetes observer for service discovery
  k8s_observer:
    auth_type: serviceAccount
    node: ${K8S_NODE_NAME}

service:
  extensions: [health_check, pprof, memory_ballast, file_storage, k8s_observer]
  
  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp, jaeger, zipkin]
      processors: [memory_limiter, resource, span, tail_sampling, batch]
      exporters: [otlp/jaeger, otlp/tempo, logging]

    # Metrics pipeline
    metrics:
      receivers: [otlp, prometheus, k8s_cluster, hostmetrics]
      processors: [memory_limiter, resource, attributes, transform, filter, batch]
      exporters: [prometheus, prometheusremotewrite, logging]

    # Logs pipeline
    logs:
      receivers: [otlp, filelog]
      processors: [memory_limiter, resource, attributes, batch]
      exporters: [elasticsearch, logging]

  telemetry:
    logs:
      level: "info"
    metrics:
      address: 0.0.0.0:8888
      level: "detailed"
    traces:
      processors:
        - batch
      exporters:
        - logging