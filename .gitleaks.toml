# GitLeaks configuration for UATP Capsule Engine
title = "UATP Capsule Engine GitLeaks Config"

[extend]
useDefault = true

[allowlist]
description = "Allowlist for known safe patterns"
paths = [
    # Test and example files
    '''.*test.*''',
    '''.*example.*''',
    '''.*\.md$''',
    '''docs/.*''',
    # Minified JS libraries - false positives
    '''.*\.min\.js$''',
    '''.*vis-network.*''',
    '''.*node_modules.*''',
    '''frontend/public/lib/.*''',
    '''public/lib/.*''',
    '''visualizer/lib/.*''',
    '''src/lib/.*''',
    # Lock files
    '''package-lock\.json$''',
    '''poetry\.lock$''',
    # Infrastructure config (placeholder values)
    '''infra/.*''',
    '''\.github/workflows/.*''',
    '''docker-compose.*''',
    '''.*\.env\.example$''',
    '''.*\.env\.sample$''',
]

regexes = [
    # Placeholder connection strings
    '''localhost''',
    '''127\.0\.0\.1''',
    '''example\.com''',
    '''your-.*-here''',
    '''changeme''',
    '''password''',
    '''uatp_password''',
    '''uatp_user''',
    # Test keys and mock data
    '''sk-[0]+''',
    '''sk-proj-\.\.\.''',
    '''sk-test\d*''',
    '''test.*key''',
    '''demo.*key''',
    '''placeholder''',
    '''mypassword\d*''',
    '''abcdef\d*''',
    # Environment variable names (not values)
    '''ENV_\w+_KEY''',
    '''OPENAI_API_KEY''',
]

# Additional path-specific allowlists
[[allowlist.commits]]
description = "Allow mock data in platform dashboard"
paths = ['''frontend/src/components/platform/platform-dashboard\.tsx''']

[[allowlist.commits]]
description = "Allow test code in secrets manager"
paths = ['''src/security/secrets_manager\.py''']

[[allowlist.commits]]
description = "Allow config definitions in secrets.py"
paths = ['''src/config/secrets\.py''']
